<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ultimate Runner Game</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #111;
            color: #fff;
            font-family: 'Press Start 2P', cursive; /* Example retro font */
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        canvas {
            display: block;
            margin: auto;
            background: linear-gradient(to bottom, #000033, #000000);
        }
        /* Basic loading screen */
        #loading-screen {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: #000;
            color: #0FF;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2em;
            z-index: 1000;
        }
    </style>
    <!-- Google Fonts for retro style -->
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
</head>
<body>
    <div id="loading-screen">LOADING...</div>
    <canvas id="gameCanvas"></canvas>

    <!-- Smol-Core Library -->
    <script src="js/smol-core/smol-core.js"></script>

    <script>
        // Game-specific variables (to be populated by GameCoder)
        let PLAYER_COLOR = '#00FFFF';
        let OBSTACLE_COLORS = ['#FF00FF', '#00FF00'];
        let SPHERE_COLOR = '#FFFF00';
        let JUMP_HEIGHT = 12;
        let DOUBLE_JUMP_ENABLED = true;
        let INITIAL_SPEED = 5;
        let MAX_SPEED = 15;
        let DIFFICULTY_CURVE = [
            { score: 0, speed: 5, spawnRate: 1000 },
            { score: 100, speed: 7, spawnRate: 800 },
            { score: 500, speed: 10, spawnRate: 600 },
            { score: 1000, speed: 12, spawnRate: 500 }
        ];
        let PARALLAX_LAYERS = [
            { img: 'https://via.placeholder.com/1200x400/000011/000022?text=Sky', speed: 0.1, yOffset: 0, alpha: 0.8 },
            { img: 'https://via.placeholder.com/1200x400/000022/000033?text=FarCity', speed: 0.3, yOffset: 50, alpha: 0.9 },
            { img: 'https://via.placeholder.com/1200x400/000033/000044?text=MidCity', speed: 0.6, yOffset: 100, alpha: 1.0 }
        ];
        let SFX_MAP = {
            jump: (dbl) => Smol.Audio.tone(dbl ? 580 : 360, 0.12, 0.12, 'square', dbl ? 880 : 580),
            die: () => { Smol.Audio.tone(280, 0.18, 0.16, 'sawtooth', 80); setTimeout(() => Smol.Audio.tone(110, 0.4, 0.18, 'sawtooth'), 200); },
            score: () => Smol.Audio.tone(1100, 0.04, 0.04, 'sine'),
            hit: () => Smol.Audio.tone(150, 0.1, 0.1, 'square', 50)
        };

        // Game state
        let score = 0;
        let highScore = Smol.Storage.get('highScore', 0);
        let player;
        let obstacles = [];
        let spheres = [];
        let gameSpeed = INITIAL_SPEED;
        let obstacleSpawnTimer = 0;
        let obstacleSpawnInterval = 1000; // ms
        let jumpCount = 0;

        // Game objects
        class Player {
            constructor(x, y, w, h, color) {
                this.x = x; this.y = y; this.w = w; this.h = h; this.color = color;
                this.vy = 0; this.grounded = false;
            }

            update(deltaTime) {
                this.vy += Smol.Physics.GRAVITY * deltaTime;
                this.y += this.vy;

                if (this.y + this.h > Smol.GY) {
                    this.y = Smol.GY - this.h;
                    this.vy = 0;
                    this.grounded = true;
                    jumpCount = 0;
                } else {
                    this.grounded = false;
                }
            }

            draw(ctx) {
                Smol.Render.gl(this.color, 15);
                ctx.fillStyle = this.color;
                ctx.fillRect(this.x, this.y, this.w, this.h);
                Smol.Render.ngl();
            }

            jump() {
                if (this.grounded || (DOUBLE_JUMP_ENABLED && jumpCount < 2)) {
                    this.vy = -JUMP_HEIGHT;
                    this.grounded = false;
                    jumpCount++;
                    SFX_MAP.jump(jumpCount > 1);
                    Smol.Effects.shakeScreen(5, 0.1);
                    Smol.Effects.burst(this.x + this.w / 2, this.y + this.h, 10, [this.color, '#FFF'], false);
                }
            }
        }

        class Obstacle {
            constructor(x, y, w, h, color) {
                this.x = x; this.y = y; this.w = w; this.h = h; this.color = color;
            }

            update(deltaTime) {
                this.x -= gameSpeed * deltaTime * 60; // Adjust for frame rate
            }

            draw(ctx) {
                Smol.Render.gl(this.color, 10);
                ctx.fillStyle = this.color;
                ctx.fillRect(this.x, this.y, this.w, this.h);
                Smol.Render.ngl();
            }
        }

        class Sphere {
            constructor(x, y, r, color) {
                this.x = x; this.y = y; this.r = r; this.color = color;
            }

            update(deltaTime) {
                this.x -= gameSpeed * deltaTime * 60; // Adjust for frame rate
            }

            draw(ctx) {
                Smol.Render.gl(this.color, 10);
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
                ctx.fill();
                Smol.Render.ngl();
            }
        }

        // Game functions
        function startGame() {
            document.getElementById('loading-screen').style.display = 'none';
            score = 0;
            gameSpeed = INITIAL_SPEED;
            player = new Player(Smol.W / 8, Smol.GY - 50, 40, 40, PLAYER_COLOR);
            obstacles = [];
            spheres = [];
            Smol.State.set('playing');
            Smol.Audio.playMusic('https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3', true, 0.3); // Example background music
        }

        function gameOverScreen() {
            Smol.State.set('game_over');
            Smol.Audio.stopMusic();
            SFX_MAP.die();
            Smol.Effects.burst(player.x + player.w / 2, player.y + player.h / 2, 50, [player.color, '#FF0000', '#FFA500']);
            Smol.Effects.shakeScreen(20, 0.5);

            if (score > highScore) {
                highScore = score;
                Smol.Storage.set('highScore', highScore);
            }

            Smol.Social.submitScore(score);
            Smol.Social.showMainButton(`Play Again! (High Score: ${highScore})`, () => {
                Smol.Social.hideMainButton();
                startGame();
            });
        }

        function updateDifficulty() {
            for (let i = DIFFICULTY_CURVE.length - 1; i >= 0; i--) {
                if (score >= DIFFICULTY_CURVE[i].score) {
                    gameSpeed = DIFFICULTY_CURVE[i].speed;
                    obstacleSpawnInterval = DIFFICULTY_CURVE[i].spawnRate;
                    break;
                }
            }
            gameSpeed = Math.min(gameSpeed, MAX_SPEED);
        }

        function spawnObstacle() {
            const type = Math.floor(Math.random() * OBSTACLE_COLORS.length);
            const color = OBSTACLE_COLORS[type];
            const w = 40 + Math.random() * 60;
            const h = 40 + Math.random() * 80;
            obstacles.push(new Obstacle(Smol.W, Smol.GY - h, w, h, color));
        }

        function spawnSphere() {
            const r = 10 + Math.random() * 10;
            spheres.push(new Sphere(Smol.W, Smol.GY - r - Math.random() * 100, r, SPHERE_COLOR));
        }

        // Main game loop functions
        function update(deltaTime) {
            if (Smol.State.is('playing')) {
                player.update(deltaTime);

                // Update and filter obstacles
                obstacles.forEach(o => o.update(deltaTime));
                obstacles = obstacles.filter(o => o.x + o.w > 0);

                // Update and filter spheres
                spheres.forEach(s => s.update(deltaTime));
                spheres = spheres.filter(s => s.x + s.r > 0);

                // Obstacle spawning
                obstacleSpawnTimer += deltaTime * 1000;
                if (obstacleSpawnTimer > obstacleSpawnInterval) {
                    if (Math.random() < 0.7) spawnObstacle();
                    else spawnSphere(); // Sometimes spawn a sphere instead of obstacle
                    obstacleSpawnTimer = 0;
                }

                // Collision detection
                for (const o of obstacles) {
                    if (Smol.Physics.hits(player, o, 5)) { // 5px padding for softer collision
                        gameOverScreen();
                        return;
                    }
                }

                // Sphere collection
                for (let i = spheres.length - 1; i >= 0; i--) {
                    const s = spheres[i];
                    if (Smol.Physics.hits(player, { x: s.x - s.r, y: s.y - s.r, w: s.r * 2, h: s.r * 2 }, 0)) {
                        score += 10;
                        SFX_MAP.score();
                        Smol.Effects.burst(s.x, s.y, 5, [s.color, '#FFF'], false);
                        spheres.splice(i, 1);
                    }
                }

                updateDifficulty();
            }
        }

        function render(ctx, W, H, GY, frame) {
            ctx.clearRect(0, 0, W, H);

            // Apply screen shake translation
            Smol.Effects.applyScreenShake();

            // Render parallax background
            Smol.Effects.renderParallax(gameSpeed / INITIAL_SPEED); // Parallax speed scales with game speed

            // Render ground
            Smol.Render.gl('#00FF00', 5);
            ctx.fillStyle = '#00FF00';
            ctx.fillRect(0, GY, W, H - GY);
            Smol.Render.ngl();

            // Render game objects
            player.draw(ctx);
            obstacles.forEach(o => o.draw(ctx));
            spheres.forEach(s => s.draw(ctx));

            // Render particles
            Smol.Effects.updateParticles(Smol.getDeltaTime());

            // Render HUD
            Smol.Render.text(`SCORE: ${score}`, Smol.W / 2, 50, '#FFF', 30, '#0FF', 15);
            if (Smol.State.is('game_over')) {
                Smol.Render.text('GAME OVER', Smol.W / 2, Smol.H / 2 - 50, '#FF0000', 60, '#FF0000', 20);
                Smol.Render.text(`High Score: ${highScore}`, Smol.W / 2, Smol.H / 2 + 20, '#FFF', 30, '#0FF', 10);
            }

            // Apply post-processing effects
            Smol.Render.vignette();
            Smol.Render.scanlines();
        }

        // Initialize Smol-Core and game
        window.onload = () => {
            Smol.Social.init(); // Initialize Telegram WebApp
            Smol.init('gameCanvas', { update: update, render: render });
            Smol.Input.bind(() => {
                if (Smol.State.is('intro')) {
                    startGame();
                } else if (Smol.State.is('playing')) {
                    player.jump();
                }
            });

            // Add parallax layers (example images, will be replaced by AI generated)
            PARALLAX_LAYERS.forEach(layer => Smol.Effects.addParallaxLayer(layer.img, layer.speed, layer.yOffset, layer.alpha));

            Smol.State.set('intro');
            Smol.Render.text('TAP TO START', Smol.W / 2, Smol.H / 2, '#0FF', 40, '#0FF', 20);
        };

    </script>
</body>
</html>
