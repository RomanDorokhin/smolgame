<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SmolGame Demo</title>
<style>
html,body{margin:0;height:100%;overflow:hidden;background:#070713;color:#fff;font-family:Arial,sans-serif}
.game{height:100%;display:grid;place-items:center;background:radial-gradient(circle at 50% 30%,#673ab7,transparent 35%),linear-gradient(160deg,#070713,#101d3f)}
.card{text-align:center;padding:32px;border:1px solid rgba(255,255,255,.18);border-radius:24px;background:rgba(255,255,255,.08);box-shadow:0 20px 60px rgba(0,0,0,.35)}
.orb{width:92px;height:92px;margin:0 auto 18px;border-radius:50%;background:linear-gradient(135deg,#ff2d55,#ffb300);animation:pulse 1.4s infinite ease-in-out}
h1{font-size:30px;margin:0 0 8px}p{margin:0;color:rgba(255,255,255,.7)}
@keyframes pulse{50%{transform:scale(1.12)}}
</style>
</head>
<body>
<div class="game"><div class="card"><div class="orb"></div><h1>Local Demo Game</h1><p>Environment is running</p></div></div>
</body>
</html>
