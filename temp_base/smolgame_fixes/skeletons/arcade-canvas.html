<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Arcade Game</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      background: #0a0a0f;
      overflow: hidden;
      font-family: 'Courier New', monospace;
    }
    canvas {
      display: block;
      /* CRITICAL: prevents Telegram feed from scrolling during gameplay */
      touch-action: none;
    }
    #ui-overlay {
      position: fixed; inset: 0;
      display: flex; align-items: center; justify-content: center;
      pointer-events: none;
    }
    .screen {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      pointer-events: all;
      text-align: center;
      padding: 32px;
    }
    .screen.active { display: flex; }
    .screen h1 { color: #fff; font-size: clamp(28px, 8vw, 56px); text-shadow: 0 0 20px #a78bfa; }
    .screen h2 { color: #fff; font-size: clamp(22px, 6vw, 40px); }
    .screen p  { color: #a0a0c0; font-size: clamp(14px, 4vw, 18px); }
    .tap-hint  { color: #a78bfa; font-size: clamp(12px, 3.5vw, 16px); animation: pulse 1.4s ease-in-out infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
    #score-display {
      position: fixed; top: 16px; left: 50%; transform: translateX(-50%);
      color: #fff; font-size: clamp(18px, 5vw, 28px);
      text-shadow: 0 0 10px #a78bfa;
      pointer-events: none;
      display: none;
    }
  </style>
</head>
<body>
<canvas id="gameCanvas"></canvas>
<div id="score-display">0</div>

<div id="ui-overlay">
  <!-- START SCREEN -->
  <div id="screen-start" class="screen active">
    <h1>GAME TITLE</h1>
    <p>Short description of how to play</p>
    <p class="tap-hint">▶ TAP TO START</p>
  </div>

  <!-- GAME OVER SCREEN -->
  <div id="screen-gameover" class="screen">
    <h2>GAME OVER</h2>
    <p id="final-score-text">Score: 0</p>
    <p id="best-score-text">Best: 0</p>
    <p class="tap-hint">▶ TAP TO RESTART</p>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════
// SAFE STORAGE — CRITICAL for Telegram WebView
// ═══════════════════════════════════════════════════════
const safeStorage = {
  set: (key, val) => {
    try { localStorage.setItem(key, JSON.stringify(val)); } catch (e) {}
  },
  get: (key, defaultVal) => {
    try { return JSON.parse(localStorage.getItem(key)) ?? defaultVal; } catch (e) { return defaultVal; }
  }
};

// ═══════════════════════════════════════════════════════
// CANVAS SETUP
// ═══════════════════════════════════════════════════════
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

function resizeCanvas() {
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

// ═══════════════════════════════════════════════════════
// AUDIO ENGINE — initialized on first tap (mobile requirement)
// ═══════════════════════════════════════════════════════
let audioCtx = null;
function getAudio() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  return audioCtx;
}
function playTone(freq = 440, type = 'square', duration = 0.08, vol = 0.15) {
  try {
    const ac = getAudio();
    const osc = ac.createOscillator();
    const gain = ac.createGain();
    osc.connect(gain); gain.connect(ac.destination);
    osc.frequency.value = freq;
    osc.type = type;
    gain.gain.setValueAtTime(vol, ac.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + duration);
    osc.start(ac.currentTime);
    osc.stop(ac.currentTime + duration);
  } catch (e) {}
}

// ═══════════════════════════════════════════════════════
// JUICE ENGINE — Screen Shake & Particles
// ═══════════════════════════════════════════════════════
let shakeIntensity = 0;
let shakeDecay = 0.85;

function screenShake(intensity = 8) {
  shakeIntensity = intensity;
}

const particles = [];
function spawnParticles(x, y, color = '#a78bfa', count = 12) {
  for (let i = 0; i < count; i++) {
    const angle = (Math.PI * 2 * i) / count + Math.random() * 0.5;
    const speed = 2 + Math.random() * 4;
    particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      life: 1.0,
      decay: 0.02 + Math.random() * 0.03,
      size: 3 + Math.random() * 4,
      color
    });
  }
}

function updateParticles() {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx; p.y += p.vy;
    p.vy += 0.15; // gravity
    p.life -= p.decay;
    if (p.life <= 0) particles.splice(i, 1);
  }
}

function drawParticles() {
  particles.forEach(p => {
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
    ctx.fill();
  });
  ctx.globalAlpha = 1;
}

// ═══════════════════════════════════════════════════════
// EASING UTILITIES
// ═══════════════════════════════════════════════════════
const lerp = (a, b, t) => a + (b - a) * t;
const easeOutBounce = (t) => {
  if (t < 1/2.75) return 7.5625*t*t;
  if (t < 2/2.75) { t -= 1.5/2.75; return 7.5625*t*t + 0.75; }
  if (t < 2.5/2.75) { t -= 2.25/2.75; return 7.5625*t*t + 0.9375; }
  t -= 2.625/2.75; return 7.5625*t*t + 0.984375;
};
const easeOutCubic = (t) => 1 - Math.pow(1 - t, 3);

// ═══════════════════════════════════════════════════════
// GAME STATE MACHINE
// ═══════════════════════════════════════════════════════
const STATE = { START: 'start', PLAYING: 'playing', GAMEOVER: 'gameover' };
let gameState = STATE.START;
let score = 0;
let bestScore = safeStorage.get('bestScore', 0);

const screens = {
  start:    document.getElementById('screen-start'),
  gameover: document.getElementById('screen-gameover'),
};
const scoreDisplay = document.getElementById('score-display');
const finalScoreText = document.getElementById('final-score-text');
const bestScoreText  = document.getElementById('best-score-text');

function showScreen(name) {
  Object.values(screens).forEach(s => s.classList.remove('active'));
  if (name && screens[name]) screens[name].classList.add('active');
  scoreDisplay.style.display = (name === null) ? 'block' : 'none';
}

// ═══════════════════════════════════════════════════════
// ▼▼▼ GAME OBJECTS — REPLACE THIS SECTION ▼▼▼
// ═══════════════════════════════════════════════════════
let player = { x: 0, y: 0, w: 40, h: 40, vy: 0, onGround: false, color: '#a78bfa' };
let obstacles = [];
let spawnTimer = 0;
const GRAVITY = 0.6;
const JUMP_FORCE = -14;
const GROUND_Y = () => canvas.height * 0.75;

function initGame() {
  player.x = canvas.width * 0.2;
  player.y = GROUND_Y() - player.h;
  player.vy = 0;
  player.onGround = true;
  obstacles.length = 0;
  spawnTimer = 0;
  score = 0;
  particles.length = 0;
  scoreDisplay.textContent = '0';
}

function updateGame(dt) {
  // Player physics
  player.vy += GRAVITY;
  player.y += player.vy;
  if (player.y >= GROUND_Y() - player.h) {
    player.y = GROUND_Y() - player.h;
    player.vy = 0;
    player.onGround = true;
  }

  // Spawn obstacles
  spawnTimer += dt;
  if (spawnTimer > 90) {
    spawnTimer = 0;
    obstacles.push({ x: canvas.width + 30, y: GROUND_Y() - 50, w: 25, h: 50, color: '#f87171' });
  }

  // Move obstacles
  for (let i = obstacles.length - 1; i >= 0; i--) {
    obstacles[i].x -= 5 * (1 + score / 500);
    if (obstacles[i].x + obstacles[i].w < 0) {
      obstacles.splice(i, 1);
      score += 10;
      scoreDisplay.textContent = score;
    }
    // Collision
    const o = obstacles[i];
    if (player.x + player.w - 8 > o.x + 4 && player.x + 8 < o.x + o.w - 4 &&
        player.y + player.h - 4 > o.y && player.y + 4 < o.y + o.h) {
      triggerGameOver();
    }
  }

  updateParticles();
  shakeIntensity *= shakeDecay;
}

function drawGame() {
  // Background
  ctx.fillStyle = '#0a0a1a';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Ground
  ctx.fillStyle = '#2a2a4a';
  ctx.fillRect(0, GROUND_Y(), canvas.width, canvas.height - GROUND_Y());

  // Player
  ctx.fillStyle = player.color;
  ctx.shadowBlur = 12; ctx.shadowColor = player.color;
  ctx.fillRect(player.x, player.y, player.w, player.h);
  ctx.shadowBlur = 0;

  // Obstacles
  obstacles.forEach(o => {
    ctx.fillStyle = o.color;
    ctx.shadowBlur = 8; ctx.shadowColor = o.color;
    ctx.fillRect(o.x, o.y, o.w, o.h);
    ctx.shadowBlur = 0;
  });

  drawParticles();
}

function handleTap() {
  if (player.onGround) {
    player.vy = JUMP_FORCE;
    player.onGround = false;
    playTone(330, 'square', 0.06);
  }
}
// ═══════════════════════════════════════════════════════
// ▲▲▲ END GAME OBJECTS SECTION ▲▲▲
// ═══════════════════════════════════════════════════════

function triggerGameOver() {
  if (gameState !== STATE.PLAYING) return;
  gameState = STATE.GAMEOVER;
  screenShake(14);
  spawnParticles(player.x + player.w / 2, player.y + player.h / 2, '#f87171', 20);
  playTone(120, 'sawtooth', 0.4, 0.2);

  if (score > bestScore) {
    bestScore = score;
    safeStorage.set('bestScore', bestScore);
  }
  finalScoreText.textContent = `Score: ${score}`;
  bestScoreText.textContent  = `Best: ${bestScore}`;
  setTimeout(() => showScreen('gameover'), 600);
}

// ═══════════════════════════════════════════════════════
// INPUT — pointer events work on both touch and mouse
// ═══════════════════════════════════════════════════════
function handlePointerDown(e) {
  e.preventDefault();
  if (gameState === STATE.START) {
    gameState = STATE.PLAYING;
    initGame();
    showScreen(null);
    playTone(440, 'square', 0.1);
    return;
  }
  if (gameState === STATE.GAMEOVER) {
    gameState = STATE.PLAYING;
    initGame();
    showScreen(null);
    playTone(440, 'square', 0.1);
    return;
  }
  if (gameState === STATE.PLAYING) {
    handleTap();
  }
}

canvas.addEventListener('pointerdown', handlePointerDown, { passive: false });
// Also support keyboard for desktop testing
window.addEventListener('keydown', (e) => {
  if (e.code === 'Space' || e.code === 'ArrowUp') handlePointerDown(e);
});

// ═══════════════════════════════════════════════════════
// GAME LOOP
// ═══════════════════════════════════════════════════════
let lastTime = 0;
let frameCount = 0;

function gameLoop(timestamp) {
  const dt = Math.min((timestamp - lastTime) / 16.67, 3); // normalized to 60fps
  lastTime = timestamp;
  frameCount++;

  if (gameState === STATE.PLAYING) {
    updateGame(dt);
  }

  // Apply screen shake
  const sx = shakeIntensity > 0.5 ? (Math.random() - 0.5) * shakeIntensity : 0;
  const sy = shakeIntensity > 0.5 ? (Math.random() - 0.5) * shakeIntensity : 0;
  ctx.save();
  ctx.translate(sx, sy);

  if (gameState !== STATE.START) {
    drawGame();
  }

  ctx.restore();

  requestAnimationFrame(gameLoop);
}

// ═══════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════
showScreen('start');
requestAnimationFrame(gameLoop);
</script>
</body>
</html>
