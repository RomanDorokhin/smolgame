<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Neon Arena</title>
<script src="https://cdn.jsdelivr.net/npm/phaser@3.80.1/dist/phaser.min.js"></script>
<script src="js/BootScene.js"></script>
<script src="js/GameScene.js"></script>
<script src="js/modules/BossDragon.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    width: 100vw;
    height: 100vh;
    font-family: 'Courier New', Courier, monospace;
  }
  canvas {
    display: block;
    filter: drop-shadow(0 0 16px #0ff) drop-shadow(0 0 40px #80f);
  }
</style>
</head>
<body>
<script>
/* ═══════════════════════════════════════════════════
   NEON ARENA — World-Class Combat Shooter
   Pure high-performance top-down shooter.
   No XP. No levels. Just skill & survival.
═══════════════════════════════════════════════════ */

const W = 900, H = 600;

/* ── Physics ── */
const PLAYER_ACCEL     = 2800;
const PLAYER_DRAG      = 1400;
const PLAYER_MAX_SPEED = 300;
const KNOCKBACK_FORCE  = 420;
const BULLET_SPEED     = 520;
const BULLET_RATE      = 160;   // ms between shots
const BULLET_LIFETIME  = 1800;  // ms

/* ── Difficulty wave scaling ── */
const WAVE_DURATION    = 18000; // ms per wave
const ENEMY_BASE_HP    = 2;
const ENEMY_BASE_SPEED = 80;
const ENEMY_SPEED_SCALE= 8;     // per wave
const ENEMY_HP_SCALE   = 2.0;   // per wave

/* ── Player ── */
const PLAYER_MAX_HP    = 100;
const PLAYER_IFRAMES   = 900;   // invulnerability ms after hit
const PLAYER_HURT_DMG  = 20;

/* ── Hit-stop ── */
const HITSTOP_KILL     = 55;
const HITSTOP_HIT      = 28;

/* ── Neon palette ── */
const C = {
  bg:       0x000814,
  grid:     0x050530,
  border:   0x0033ff,
  player:   0x00ffff,
  playerGl: 0x00ffff,
  bullet:   0xffff00,
  bulletGl: 0xffee00,
  enemy:    0xff1e5a,
  enemyGl:  0xff1e5a,
  hitFlash: 0xffffff,
  joy:      0x00ffff,
  joyKnob:  0xffffff,
  hp:       0x00ff88,
  hpLow:    0xff3344,
  score:    0xffff00,
  wave:     0xff88ff,
  kill:     0xff4488,
};

/* ═══════════════════════════════════════════════════
   PHASER CONFIG
═══════════════════════════════════════════════════ */
const config = {
  type: Phaser.AUTO,
  width: W, height: H,
  backgroundColor: '#000814',
  physics: {
    default: 'arcade',
    arcade: { gravity: { x: 0, y: 0 }, debug: false, fps: 120 },
  },
  scene: [BootScene, GameScene],
  scale: {
    mode: Phaser.Scale.FIT,
    autoCenter: Phaser.Scale.CENTER_BOTH,
  },
  render: {
    antialias: true,
    powerPreference: 'high-performance',
    pixelArt: false,
  },
  fps: { target: 60, forceSetTimeOut: false },
};

const game = new Phaser.Game(config);
</script>
</body>
</html>
