name = "smolgame"
main = "src/index.js"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

# ───────────────────────────────────────────────
# D1 (sqlite в облаке Cloudflare)
# database_id заполнится автоматически после `npm run db:create`
# ───────────────────────────────────────────────
[[d1_databases]]
binding = "DB"
database_name = "smolgame"
database_id = "bc1e52ac-4a7f-4b2c-bcb8-353269568a24"

# ───────────────────────────────────────────────
# Настройки (не секреты, лежат в репе)
# ───────────────────────────────────────────────
[vars]
# Telegram ID админов через запятую (только они видят очередь модерации).
ADMIN_TG_IDS = "336216597"
# Telegram numeric id через запятую: только эти аккаунты видят вкладку «Премиум» в мини-аппе (жёсткий allowlist).
# Важно: значение в [vars] попадает в Worker при каждом `wrangler deploy` — не оставляй пустым, если премиум нужен.
# Игровой HTML на Worker не принимаем — премиум не открывает загрузку кода на сервер.
PREMIUM_TG_IDS = "336216597"

# Origin фронтенда для CORS. GitHub Pages = <username>.github.io.
FRONTEND_ORIGIN = "https://romandorokhin.github.io"
# Путь мини-аппа на GitHub Pages.
GITHUB_APP_PATH = "/smolgame"
# После GitHub OAuth браузер попадает на Worker /auth/github/done — там ссылка в Telegram (должен совпадать с js/config.js BOT_USERNAME).
TELEGRAM_BOT_USERNAME = "smolgame_bot"
# Если мини-апп заведён как t.me/bot/shortname — укажи shortname (иначе только кнопка Menu у бота).
# TELEGRAM_MINI_APP_SHORT_NAME = ""
# GitHub OAuth App → Client ID (публичный). ОБЯЗАТЕЛЬНО держи здесь: иначе `wrangler deploy`
# сотрёт переменные, заданные только в Dashboard, и вход через GitHub сломается.
GITHUB_CLIENT_ID = "Ov23linmpKR0Bab5Fogn"
# Если Worker на своём домене, укажи полный origin без слэша (иначе берётся из запроса).
# GITHUB_OAUTH_REDIRECT_BASE = "https://smolgame.dorokhin731.workers.dev"

# ───────────────────────────────────────────────
# Секреты (НЕ здесь, положить отдельной командой — переживают deploy):
#   npx wrangler secret put TELEGRAM_BOT_TOKEN
#   npx wrangler secret put GITHUB_CLIENT_SECRET
# Токен нужен для валидации initData от Telegram WebApp.
# Callback в GitHub OAuth App: https://smolgame.dorokhin731.workers.dev/auth/github/callback
# Локально: backend/.dev.vars см. .env.example
#
# R2 для обложек (после создания bucket в Dashboard раскомментируй и задеплой):
#   1) Cloudflare → R2 → Create bucket → например smolgame-images
#   2) Раскомментируй [[r2_buckets]] ниже, bucket_name = имя bucket
#   3) [vars] PUBLIC_IMAGE_BASE_URL = публичный URL bucket (R2.dev или custom domain)
#   4) npm run deploy
#[[r2_buckets]]
#binding = "IMAGES"
#bucket_name = "smolgame-images"
# PUBLIC_IMAGE_BASE_URL = "https://pub-xxxxx.r2.dev"
# ───────────────────────────────────────────────
