name = "smolgame"
main = "src/index.js"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

# ───────────────────────────────────────────────
# D1 (sqlite в облаке Cloudflare)
# database_id заполнится автоматически после `npm run db:create`
# ───────────────────────────────────────────────
[[d1_databases]]
binding = "DB"
database_name = "smolgame"
database_id = "bc1e52ac-4a7f-4b2c-bcb8-353269568a24"

# ───────────────────────────────────────────────
# Настройки (не секреты, лежат в репе)
# ───────────────────────────────────────────────
[vars]
# Telegram ID админов через запятую (только они видят очередь модерации).
ADMIN_TG_IDS = "336216597"

# Origin фронтенда для CORS. GitHub Pages = <username>.github.io.
FRONTEND_ORIGIN = "https://romandorokhin.github.io"
# Путь мини-аппа на GitHub Pages (редирект после GitHub OAuth).
GITHUB_APP_PATH = "/smolgame"
# Если Worker на своём домене, укажи полный origin без слэша (иначе берётся из запроса).
# GITHUB_OAUTH_REDIRECT_BASE = "https://smolgame.dorokhin731.workers.dev"

# ───────────────────────────────────────────────
# Секреты (НЕ здесь, положить отдельной командой!):
#   npx wrangler secret put TELEGRAM_BOT_TOKEN
#   npx wrangler secret put GITHUB_CLIENT_SECRET
# Токен нужен для валидации initData от Telegram WebApp.
# GitHub OAuth: создай OAuth App (callback = <WORKER>/auth/github/callback),
#   npx wrangler vars put GITHUB_CLIENT_ID
#   npx wrangler secret put GITHUB_CLIENT_SECRET
# ───────────────────────────────────────────────
