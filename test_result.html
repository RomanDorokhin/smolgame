<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>OpenGame Runner</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #f0f0f0;
        }
        canvas {
            display: block;
        }
    </style>
</head>
<body>

    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.js"></script>
    <script>
        var config = {
            type: Phaser.AUTO,
            width: 800,
            height: 600,
            backgroundColor: '#87CEEB',
            physics: {
                default: 'arcade',
                arcade: {
                    gravity: { y: 600 },
                    debug: true
                }
            },
            scene: {
                preload: preload,
                create: create,
                update: update
            }
        };

        var player;
        var platform;
        var obstacles;
        var score = 0;
        var scoreText;
        var gameOver = false;
        var timedEvent;

        var game = new Phaser.Game(config);

        function preload() {}

        function create() {
            // Платформа (земля) - Зеленая
            platform = this.add.rectangle(400, 575, 800, 50, 0x228B22);
            this.physics.add.existing(platform, true);

            // Игрок (кубик) - Синий
            player = this.add.rectangle(100, 400, 40, 40, 0x0000FF);
            this.physics.add.existing(player);
            player.body.setBounce(0.1);
            player.body.setCollideWorldBounds(true);

            // Коллайдер игрока с землей
            this.physics.add.collider(player, platform);

            obstacles = this.physics.add.group();
            this.physics.add.collider(player, obstacles, hitObstacle, null, this);

            this.input.on('pointerdown', jump, this);
            
            scoreText = this.add.text(20, 20, 'Score: 0', { fontSize: '32px', fill: '#fff' });

            timedEvent = this.time.addEvent({ 
                delay: 1500, 
                callback: addObstacle, 
                callbackScope: this, 
                loop: true 
            });
        }

        function update() {
            if (gameOver) return;
            score += 1;
            scoreText.setText('Score: ' + Math.floor(score / 10));
        }

        function jump() {
            if (player.body.touching.down || player.body.blocked.down) {
                player.body.setVelocityY(-400);
            }
        }

        function addObstacle() {
            if (gameOver) return;
            var obstacle = this.add.rectangle(850, 530, 30, 40, 0xFF0000);
            obstacles.add(obstacle);
            this.physics.add.existing(obstacle);
            obstacle.body.setImmovable(true);
            obstacle.body.setAllowGravity(false);
            obstacle.body.setVelocityX(-300);
        }

        function hitObstacle(player, obstacle) {
            this.physics.pause();
            gameOver = true;
            this.add.text(400, 300, 'GAME OVER', { fontSize: '64px', fill: '#fff' }).setOrigin(0.5);
        }
    </script>
</body>
</html>
