name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_IP }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            # Переходим в репозиторий на сервере и подтягиваем изменения
            cd /root/smolgame-frontend
            git reset --hard
            git pull origin main
            
            # Сборка Агента (фронтенд)
            cd /root/smolgame-frontend/agent
            echo "--- Building Agent ---"
            rm -rf node_modules dist ../agent-v3
            npm install
            npm run build || { echo "Agent build FAILED"; exit 1; }
            
            cd /root/smolgame-frontend
            
            # Обновляем статику (Фронтенд)
            echo "Copying frontend files..."
            cp /root/smolgame-frontend/index.html /var/www/smolgame/frontend/index.html
            cp /root/smolgame-frontend/styles.css /var/www/smolgame/frontend/styles.css
            cp -r /root/smolgame-frontend/js/* /var/www/smolgame/frontend/js/
            cp -r /root/smolgame-frontend/assets/* /var/www/smolgame/frontend/assets/ 2>/dev/null || true
            
            # Обновляем Агент (целиком с index.html)
            echo "Copying Agent-v3 files..."
            rm -rf /var/www/smolgame/frontend/agent-v3
            mkdir -p /var/www/smolgame/frontend/agent-v3
            cp -r /root/smolgame-frontend/agent-v3/* /var/www/smolgame/frontend/agent-v3/
            echo "Build Date: $(date)" > /var/www/smolgame/frontend/version.txt
            
            # Настраиваем API URL для ленты (не минифицированной)
            sed -i 's|https://smolgame.dorokhin731.workers.dev|/api|g' /var/www/smolgame/frontend/index.html
            find /var/www/smolgame/frontend/js -name "*.js" -exec sed -i 's|https://smolgame.dorokhin731.workers.dev|/api|g' {} \;
            sed -i "s|'/api';|'';|g" /var/www/smolgame/frontend/js/core/api.js
            
            # Сброс кэша Агента в screens.js
            echo "Busting Agent cache in screens.js..."
            sed -i "s|?v=[0-9A-Za-z-]*|?v=$(date +%s)|g" /var/www/smolgame/frontend/js/ui/screens.js
            
            # Подготавливаем OpenGame (собираем CLI)
            echo "Building OpenGame CLI..."
            if [ -d "/root/smolgame-frontend/agent/OpenGame" ]; then
              cd /root/smolgame-frontend/agent/OpenGame
              npm install
              npm run bundle
            fi

            # Перезапускаем сервисы
            echo "Restarting services..."
            cd /root/smolgame-frontend/backend
            npm install
            pm2 restart smolgame-api
            pm2 start src/opengame-server.js --name opengame-server || pm2 restart opengame-server
            
            echo "Deployment finished successfully!"
            
            echo "✅ Deployment successful!"
