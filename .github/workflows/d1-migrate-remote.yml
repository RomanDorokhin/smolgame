# Запуск миграции D1 в проде из GitHub (без клона репы на Мак).
#
# Один раз в репозитории: Settings → Secrets and variables → Actions
#   CLOUDFLARE_API_TOKEN — токен с правом D1 Edit (и при необходимости Workers)
#   CLOUDFLARE_ACCOUNT_ID — из Cloudflare Dashboard (правый сайдбар на Overview)
#
# Потом: Actions → "D1 migrate (remote)" → Run workflow → выбери файл миграции → Run.

name: D1 migrate (remote)

on:
  workflow_dispatch:
    inputs:
      file:
        description: "Файл в backend/migrations/"
        required: true
        default: "0002_oauth_states.sql"
        type: choice
        options:
          - "0002_oauth_states.sql"
          - "0001_add_game_columns.sql"

jobs:
  migrate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Install wrangler
        run: npm ci

      - name: Execute on remote D1
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler d1 execute smolgame --remote --file="./migrations/${{ inputs.file }}"
