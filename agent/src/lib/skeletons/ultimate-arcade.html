<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>SmolGame Pro</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#000;touch-action:none;font-family:'Orbitron',sans-serif}
canvas{display:block;touch-action:none}
#ui{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none;color:#fff;text-align:center}
.screen{display:none;flex-direction:column;gap:30px;pointer-events:all;padding:40px;background:rgba(0,0,0,0.8);border:1px solid #333;border-radius:24px;backdrop-filter:blur(10px);box-shadow:0 0 50px rgba(0,255,200,0.1)}
.screen.active{display:flex}
h1{font-size:clamp(24px,8vw,48px);background:linear-gradient(45deg,#00ffcc,#0066ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;text-transform:uppercase;letter-spacing:4px}
#hud{position:fixed;top:20px;left:20px;right:20px;display:flex;justify-content:space-between;pointer-events:none;font-weight:900;text-shadow:0 0 10px #00ffcc}
button{padding:18px 48px;border:none;border-radius:12px;background:linear-gradient(45deg,#00ffcc,#0066ff);color:#000;font-weight:900;font-size:20px;cursor:pointer;text-transform:uppercase;transition:transform 0.2s}
button:active{transform:scale(0.95)}
#joy-base{position:fixed;bottom:40px;left:40px;width:100px;height:100px;background:rgba(255,255,255,0.1);border-radius:50%;display:none;pointer-events:all;border:1px solid rgba(255,255,255,0.2)}
#joy-stick{position:absolute;top:30px;left:30px;width:40px;height:40px;background:#00ffcc;border-radius:50%;box-shadow:0 0 20px #00ffcc}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="hud"><div id="score">000000</div><div id="best">HI: 000000</div></div>
<div id="joy-base"><div id="joy-stick"></div></div>
<div id="ui">
  <div id="start" class="screen active">
    <h1 id="title">TITLE</h1>
    <p id="desc">TOUCH TO START</p>
    <button onclick="startGame()">START</button>
  </div>
  <div id="over" class="screen">
    <h1>GAME OVER</h1>
    <h2 id="fscore">SCORE: 0</h2>
    <button onclick="startGame()">RETRY</button>
  </div>
</div>

<script>
const canvas=document.getElementById('c'), ctx=canvas.getContext('2d');
let W,H,scale=1,state='start',score=0,hi=0,shake=0;
const cam={x:0,y:0,zoom:1}, joy={x:0,y:0,active:false};

const safeStorage={
  set:(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v))}catch(e){}},
  get:(k,d)=>{try{return JSON.parse(localStorage.getItem(k))??d}catch(e){return d}}
};
hi=safeStorage.get('smol_hi',0);

const glow=(c,b)=>{ctx.shadowColor=c;ctx.shadowBlur=b*scale;};
const nglow=()=>{ctx.shadowBlur=0;};

class Part{
  constructor(x,y,c){
    this.x=x;this.y=y;this.c=c;this.s=Math.random()*4+2;
    this.vx=(Math.random()-0.5)*10;this.vy=(Math.random()-0.5)*10;
    this.a=1;
  }
  u(){this.x+=this.vx;this.y+=this.vy;this.vy+=0.2;this.a-=0.02;}
  d(){ctx.globalAlpha=this.a;ctx.fillStyle=this.c;ctx.fillRect(this.x,this.y,this.s,this.s);ctx.globalAlpha=1;}
}
let parts=[];

function resize(){
  W=canvas.width=window.innerWidth;
  H=canvas.height=window.innerHeight;
  scale=Math.min(W,H)/400;
}
resize();
window.addEventListener('resize',resize);

function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  if(id)document.getElementById(id).classList.add('active');
  document.getElementById('hud').style.opacity=id?0:1;
  document.getElementById('joy-base').style.display=(!id && joy.enabled)?'block':'none';
}

function startGame(){
  state='play';
  score=0;
  showScreen(null);
  if(typeof init==='function')init();
}

function gameOver(){
  state='over';
  if(score>hi){hi=score;safeStorage.set('smol_hi',hi)}
  document.getElementById('fscore').innerText='SCORE: '+score;
  document.getElementById('best').innerText='HI: '+String(hi).padStart(6,'0');
  showScreen('over');
}

function loop(){
  ctx.clearRect(0,0,W,H);
  ctx.save();
  if(shake>0.5){ctx.translate((Math.random()-0.5)*shake,(Math.random()-0.5)*shake);shake*=0.85}
  
  if(state==='play'){
    if(typeof update==='function')update();
    ctx.save();
    ctx.translate(W/2,H/2);
    ctx.scale(cam.zoom,cam.zoom);
    ctx.translate(-cam.x,-cam.y);
    if(typeof draw==='function')draw();
    ctx.restore();
    document.getElementById('score').innerText=String(score).padStart(6,'0');
  }

  ctx.restore();
  requestAnimationFrame(loop);
}

// ─── INPUT (JOYSTICK & SWIPE) ─────────────────────────────────
const jBase=document.getElementById('joy-base'), jStick=document.getElementById('joy-stick');
const swipe={up:false,down:false,left:false,right:false,x:0,y:0};
let sX=0,sY=0,sT=50;

const handleJoy=(e)=>{
  if(!joy.active)return;
  const r=jBase.getBoundingClientRect(), cx=r.left+50, cy=r.top+50;
  const dx=e.clientX-cx, dy=e.clientY-cy, d=Math.sqrt(dx*dx+dy*dy);
  const m=Math.min(d,40);
  joy.x=d?(dx/d)*(m/40):0; joy.y=d?(dy/d)*(m/40):0;
  jStick.style.transform=`translate(${joy.x*40}px,${joy.y*40}px)`;
};

window.addEventListener('pointerdown',e=>{
  if(e.target===jBase||jBase.contains(e.target)){joy.active=true;handleJoy(e);}
  else{
    sX=e.clientX; sY=e.clientY;
    if(state==='play'&&typeof onTouch==='function')onTouch(e);
  }
});
window.addEventListener('pointermove',handleJoy);
window.addEventListener('pointerup',e=>{
  if(joy.active){joy.active=false;joy.x=0;joy.y=0;jStick.style.transform='';}
  else {
    const dx=e.clientX-sX, dy=e.clientY-sY;
    if(Math.abs(dx)>sT||Math.abs(dy)>sT){
      if(Math.abs(dx)>Math.abs(dy)) { if(dx>0)swipe.right=true; else swipe.left=true; }
      else { if(dy>0)swipe.down=true; else swipe.up=true; }
    }
  }
});

// ─── OVERRIDE THESE ──────────────────────────────────────────
function init(){ joy.enabled=false; } 
function update(){
  // Check swipe.up, swipe.down, etc. 
  // IMPORTANT: reset swipe flags after reading or at end of update()
}
function draw(){}

requestAnimationFrame(loop);
</script>
</body>
</html>
