<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>SMOL ULTIMATE ENGINE</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#000;touch-action:none}
canvas{display:block;touch-action:none}
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
// ═══════════════════════════════════════════════════════
// SMOL ULTIMATE ENGINE — Reference implementation
// ═══════════════════════════════════════════════════════
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

let W, H, GY; 
function resize() {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
  GY = H * 0.76;
}
resize();
window.addEventListener('resize', () => { resize(); initScene(); });

// ── Constants ──────────────────────────────────
const BASE_SPD = 6;
const GRAV     = 0.62;
const JPW      = -17;
const PW = 36, PH = 36;

// ── Game state ─────────────────────────────────
let state = 'intro'; // intro | playing | dead
let score = 0, hi = 0, spd = BASE_SPD, fr = 0;
let newBest = false, iT = 0, dT = 0;
let shake = { v: 0, x: 0, y: 0 };

const safeStorage = {
  set: (k, v) => { try { localStorage.setItem(k, JSON.stringify(v)); } catch(e) {} },
  get: (k, d) => { try { return JSON.parse(localStorage.getItem(k)) ?? d; } catch(e) { return d; } }
};
hi = safeStorage.get('smol_hi_score', 0);

// ── Scene objects ──────────────────────────────
let pl, stars = [], city = [], rain = [], obs = [], parts = [], gridScroll = 0;

function mkPl() {
  pl = { x: 100, y: GY - PH, vy: 0, j: 2, g: true, trail: [], gp: 0 };
}

function initScene() {
  GY = H * 0.76;
  // Parallax Background Setup
  stars = Array.from({ length: 120 }, () => ({
    x: Math.random() * W, y: Math.random() * GY * 0.9,
    r: Math.random() * 1.5 + 0.2, sp: Math.random() * 0.4 + 0.1,
    a: Math.random() * 0.5 + 0.3, ph: Math.random() * 6.28,
  }));
  // City layers (3-layer parallax)
  city = [0, 1, 2].map(d => {
    const blds = []; let x = 0;
    while (x < W * 3.5) {
      const bw = 20 + Math.random() * 80;
      const bh = 30 + Math.random() * (130 - d * 30);
      blds.push({ rx: x, bw, bh });
      x += bw + Math.random() * 10;
    }
    return { blds, totalW: x, ox: 0, sp: 0.3 + d * 0.3, al: 0.1 + d * 0.1, col: ['#0c0020','#070018','#180032'][d] };
  });
}

// ── Audio ──────────────────────────────────────
let AC;
const getAC = () => AC || (AC = new (window.AudioContext || window.webkitAudioContext)());
function tone(f, d, v = 0.15, type = 'square', sweep = null) {
  try {
    const a = getAC(), o = a.createOscillator(), g = a.createGain();
    o.connect(g); g.connect(a.destination);
    o.type = type;
    o.frequency.setValueAtTime(f, a.currentTime);
    if (sweep) o.frequency.exponentialRampToValueAtTime(sweep, a.currentTime + d);
    g.gain.setValueAtTime(v, a.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, a.currentTime + d);
    o.start(); o.stop(a.currentTime + d);
  } catch(e) {}
}

// ── Drawing & Effects ──────────────────────────
const gl = (c,b) => { ctx.shadowColor=c; ctx.shadowBlur=b; };
const ngl = () => { ctx.shadowBlur=0; };

function drawSky() {
  const g = ctx.createLinearGradient(0,0,0,GY);
  g.addColorStop(0,'#010010'); g.addColorStop(1,'#130038');
  ctx.fillStyle = g; ctx.fillRect(0,0,W,GY);
}

function drawGround() {
  ctx.fillStyle = '#090018'; ctx.fillRect(0,GY,W,H-GY);
  gridScroll = (gridScroll + spd*0.016) % 1;
  // Perspective Grid
  for (let i = 0; i <= 20; i++) {
    const t = i/20; const gx = t*W;
    ctx.strokeStyle = `rgba(190,0,255,0.15)`;
    ctx.beginPath(); ctx.moveTo(W*0.5 + (gx-W*0.5)*0.05, GY); ctx.lineTo(gx, H); ctx.stroke();
  }
  ctx.beginPath(); ctx.moveTo(0,GY); ctx.lineTo(W,GY);
  ctx.strokeStyle='#ff00ff'; ctx.lineWidth=3; gl('#ff00ff',20); ctx.stroke(); ngl();
}

function drawHUD() {
  ctx.save();
  ctx.font='900 24px Orbitron,monospace';
  gl('#00ffcc',15); ctx.fillStyle='#00ffcc';
  ctx.fillText(String(score).padStart(6,'0'), 20, 50);
  ctx.font='700 12px Orbitron,monospace';
  ctx.fillText('BEST: ' + String(hi).padStart(6,'0'), 20, 75);
  ctx.restore();
}

// ── Core Loop ──────────────────────────────────
function update() {
  if(state!=='playing') return;
  fr++; spd += 0.002;
  if(fr%5===0) score++;

  pl.vy += GRAV; pl.y += pl.vy;
  if(pl.y+PH >= GY){ pl.y=GY-PH; pl.vy=0; pl.j=2; pl.g=true; } else { pl.g=false; }

  // Collision & Obstacles logic...
  shake.x=(Math.random()-.5)*shake.v;
  shake.y=(Math.random()-.5)*shake.v;
  shake.v*=0.85;
}

function loop(){
  ctx.clearRect(0,0,W,H);
  ctx.save();
  if(shake.v>0.5) ctx.translate(shake.x,shake.y);
  drawSky(); drawGround();
  if(state==='playing') { /* draw objects */ drawHUD(); }
  if(state==='intro') { /* draw intro */ }
  ctx.restore();
  update();
  requestAnimationFrame(loop);
}

// ── Input ──────────────────────────────────────
function doJump() {
  if(state==='intro') { state='playing'; score=0; spd=BASE_SPD; return; }
  if(pl.j>0) { pl.vy=JPW; pl.j--; tone(400, 0.1, 0.1, 'square', 600); }
}
window.addEventListener('pointerdown', e => { e.preventDefault(); doJump(); });

initScene(); mkPl(); loop();
</script>
</body>
</html>
