<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>SmolGame Pro</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;overflow:hidden;background:#000;touch-action:none;font-family:'Orbitron',sans-serif;position:fixed}
canvas{display:block;touch-action:none;image-rendering:pixelated}
#ui{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none;color:#fff;text-align:center;z-index:10}
.screen{display:none;flex-direction:column;gap:30px;pointer-events:all;padding:40px;background:rgba(0,0,0,0.85);border:2px solid #333;border-radius:32px;backdrop-filter:blur(20px);box-shadow:0 0 80px rgba(0,255,200,0.15);max-width:90%}
.screen.active{display:flex;animation:fadeIn 0.3s ease-out}
@keyframes fadeIn{from{opacity:0;transform:scale(0.9)}to{opacity:1;transform:scale(1)}}
h1{font-size:clamp(32px,10vw,64px);background:linear-gradient(45deg,#00ffcc,#0066ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;text-transform:uppercase;letter-spacing:6px;font-weight:900;filter:drop-shadow(0 0 10px rgba(0,255,200,0.5))}
#hud{position:fixed;top:max(20px,env(safe-area-inset-top));left:20px;right:20px;display:flex;justify-content:space-between;pointer-events:none;font-weight:900;text-shadow:0 0 15px #00ffcc;font-size:20px;z-index:5;transition:opacity 0.3s}
button{padding:20px 50px;border:none;border-radius:16px;background:linear-gradient(45deg,#00ffcc,#0066ff);color:#000;font-weight:900;font-size:22px;cursor:pointer;text-transform:uppercase;transition:transform 0.1s,box-shadow 0.2s;box-shadow:0 10px 0 #008877}
button:active{transform:translateY(5px);box-shadow:0 5px 0 #008877}
#joy-base{position:fixed;bottom:60px;left:60px;width:120px;height:120px;background:rgba(255,255,255,0.05);border-radius:50%;display:none;pointer-events:all;border:2px solid rgba(255,255,255,0.1);backdrop-filter:blur(5px)}
#joy-stick{position:absolute;top:35px;left:35px;width:50px;height:50px;background:linear-gradient(45deg,#00ffcc,#0066ff);border-radius:50%;box-shadow:0 0 30px #00ffcc}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="hud"><div id="score">000000</div><div id="best">HI: 000000</div></div>
<div id="joy-base"><div id="joy-stick"></div></div>
<div id="ui">
  <div id="start" class="screen active">
    <h1 id="title">TITLE</h1>
    <p style="color:#00ffcc;letter-spacing:2px">PRO EDITION</p>
    <button onclick="startGame()">START</button>
  </div>
  <div id="over" class="screen">
    <h1>GAME OVER</h1>
    <h2 id="fscore" style="font-size:32px;margin-bottom:10px">SCORE: 0</h2>
    <button onclick="startGame()">RETRY</button>
  </div>
</div>

<script>
// --- POLYFILLS ---
if(!CanvasRenderingContext2D.prototype.roundRect){CanvasRenderingContext2D.prototype.roundRect=function(x,y,w,h,r){if(w<2*r)r=w/2;if(h<2*r)r=h/2;this.beginPath();this.moveTo(x+r,y);this.arcTo(x+w,y,x+w,y+h,r);this.arcTo(x+w,y+h,x,y+h,r);this.arcTo(x,y+h,x,y,r);this.arcTo(x,y,x+w,y,r);this.closePath();return this;}}

const canvas=document.getElementById('c'), ctx=canvas.getContext('2d');
let W,H,scale=1,state='start',score=0,hi=0,shake=0,dt=0,lastT=0;
const cam={x:0,y:0,zoom:1}, joy={x:0,y:0,active:false,enabled:false};
const swipe={up:false,down:false,left:false,right:false,x:0,y:0};

const safeStorage={
  set:(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v))}catch(e){}},
  get:(k,d)=>{try{return JSON.parse(localStorage.getItem(k))??d}catch(e){return d}}
};
hi=safeStorage.get('smol_hi',0);

const glow=(c,b)=>{ctx.shadowColor=c;ctx.shadowBlur=b*scale;};
const nglow=()=>{ctx.shadowBlur=0;};

class Part{
  constructor(x,y,c){
    this.x=x;this.y=y;this.c=c;this.s=Math.random()*4+2;
    this.vx=(Math.random()-0.5)*10;this.vy=(Math.random()-0.5)*10;
    this.a=1;
  }
  u(){this.x+=this.vx;this.y+=this.vy;this.vy+=0.2;this.a-=0.02;}
  d(){ctx.globalAlpha=this.a;ctx.fillStyle=this.c;ctx.fillRect(this.x,this.y,this.s,this.s);ctx.globalAlpha=1;}
}
let parts=[];

// --- AUDIO SYSTEM ---
let audioCtx;
const sfx=(f,t,type='sine')=>{
  if(!audioCtx)return;
  const o=audioCtx.createOscillator(), g=audioCtx.createGain();
  o.type=type; o.frequency.setValueAtTime(f,audioCtx.currentTime);
  o.connect(g); g.connect(audioCtx.destination);
  o.start(); g.gain.exponentialRampToValueAtTime(0.00001,audioCtx.currentTime+t);
  o.stop(audioCtx.currentTime+t);
};

function resize(){
  W=canvas.width=window.innerWidth;
  H=canvas.height=window.innerHeight;
  scale=Math.min(W,H)/400;
}
resize();
window.addEventListener('resize',resize);

function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  if(id)document.getElementById(id).classList.add('active');
  document.getElementById('hud').style.opacity=id?0:1;
  document.getElementById('joy-base').style.display=(!id && joy.enabled)?'block':'none';
}

function startGame(){
  if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  if(audioCtx.state==='suspended')audioCtx.resume();
  state='play';
  score=0;
  parts=[];
  showScreen(null);
  if(typeof init==='function')init();
}

function gameOver(){
  state='over';
  if(score>hi){hi=score;safeStorage.set('smol_hi',hi)}
  document.getElementById('fscore').innerText='SCORE: '+score;
  document.getElementById('best').innerText='HI: '+String(hi).padStart(6,'0');
  showScreen('over');
}

function loop(t){
  dt=(t-lastT)/16.6; lastT=t;
  ctx.clearRect(0,0,W,H);
  ctx.save();
  if(shake>0.5){ctx.translate((Math.random()-0.5)*shake,(Math.random()-0.5)*shake);shake*=0.9}
  
  if(state==='play'){
    if(typeof update==='function')update();
    ctx.save();
    ctx.translate(W/2,H/2);
    ctx.scale(cam.zoom,cam.zoom);
    ctx.translate(-cam.x,-cam.y);
    if(typeof draw==='function')draw();
    ctx.restore();
    document.getElementById('score').innerText=String(score).padStart(6,'0');
  }

  ctx.restore();
  requestAnimationFrame(loop);
}

// --- INPUT HANDLERS ---
const jBase=document.getElementById('joy-base'), jStick=document.getElementById('joy-stick');
let sX=0,sY=0,sT=50;

const handleJoy=(e)=>{
  if(!joy.active)return;
  const rect=jBase.getBoundingClientRect(), cx=rect.left+60, cy=rect.top+60;
  const clientX=e.clientX||(e.touches?e.touches[0].clientX:0);
  const clientY=e.clientY||(e.touches?e.touches[0].clientY:0);
  const dx=clientX-cx, dy=clientY-cy, d=Math.sqrt(dx*dx+dy*dy);
  const m=Math.min(d,40);
  joy.x=d?(dx/d)*(m/40):0; joy.y=d?(dy/d)*(m/40):0;
  jStick.style.transform=`translate(${joy.x*40}px,${joy.y*40}px)`;
};

window.addEventListener('pointerdown',e=>{
  if(e.target===jBase||jBase.contains(e.target)){joy.active=true;handleJoy(e);}
  else{
    sX=e.clientX; sY=e.clientY;
    if(state==='play'&&typeof onTouch==='function')onTouch(e);
  }
});
window.addEventListener('pointermove',handleJoy);
window.addEventListener('pointerup',e=>{
  if(joy.active){joy.active=false;joy.x=0;joy.y=0;jStick.style.transform='';}
  else {
    const dx=e.clientX-sX, dy=e.clientY-sY;
    if(Math.abs(dx)>sT||Math.abs(dy)>sT){
      if(Math.abs(dx)>Math.abs(dy)) { if(dx>0)swipe.right=true; else swipe.left=true; }
      else { if(dy>0)swipe.down=true; else swipe.up=true; }
    }
  }
});

requestAnimationFrame(loop);

/* INJECT_LOGIC_HERE */
</script>
</body>
</html>
