<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>SmolGame Arcade</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      background: #050508;
      overflow: hidden;
      font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    }
    canvas { display: block; touch-action: none; }
    #ui {
      position: fixed; inset: 0;
      display: flex; align-items: center; justify-content: center;
      pointer-events: none; color: white; text-align: center;
    }
    .screen {
      display: none; flex-direction: column; gap: 20px;
      pointer-events: all; padding: 20px;
    }
    .screen.active { display: flex; }
    #score-ui {
      position: fixed; top: 20px; width: 100%;
      font-weight: 900; font-size: 24px; pointer-events: none;
    }
    button {
      padding: 15px 40px; border: none; border-radius: 15px;
      background: #3b82f6; color: white; font-weight: bold;
      font-size: 18px; cursor: pointer;
    }
  </style>
</head>
<body>
<canvas id="c"></canvas>
<div id="score-ui"></div>
<div id="ui">
  <div id="start-screen" class="screen active">
    <h1 id="game-title">GAME TITLE</h1>
    <p id="game-desc">Touch to start</p>
    <button id="start-btn">PLAY</button>
  </div>
  <div id="over-screen" class="screen">
    <h1>GAME OVER</h1>
    <h2 id="final-score">Score: 0</h2>
    <button id="restart-btn">TRY AGAIN</button>
  </div>
</div>

<script>
// ─── CORE ENGINE ──────────────────────────────────────────────
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H, scale = 1;

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
  scale = Math.min(W, H) / 400; // Base scale for responsiveness
}
resize();
window.addEventListener('resize', resize);

const safeStorage = {
  set: (k, v) => { try { localStorage.setItem(k, JSON.stringify(v)); } catch(e) {} },
  get: (k, d) => { try { return JSON.parse(localStorage.getItem(k)) ?? d; } catch(e) { return d; } }
};

// ─── GAME STATE ───────────────────────────────────────────────
let state = 'start'; // start | play | over
let score = 0;
let hi = safeStorage.get('smol_hi', 0);

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  if(id) document.getElementById(id).classList.add('active');
  document.getElementById('score-ui').style.display = id ? 'none' : 'block';
}

// ─── UTILS ────────────────────────────────────────────────────
let shake = 0;
function screenShake(v) { shake = v; }

function playTone(f, d) {
  try {
    const ac = new (window.AudioContext || window.webkitAudioContext)();
    const o = ac.createOscillator(), g = ac.createGain();
    o.connect(g); g.connect(ac.destination);
    o.frequency.value = f; g.gain.exponentialRampToValueAtTime(0.0001, ac.currentTime + d);
    o.start(); o.stop(ac.currentTime + d);
  } catch(e) {}
}

// ─── INPUT ────────────────────────────────────────────────────
function handleInput(e) {
  if (e) e.preventDefault();
  if (state === 'start' || state === 'over') {
    state = 'play';
    score = 0;
    showScreen(null);
    if (typeof init === 'function') init();
  } else {
    if (typeof onTouch === 'function') onTouch(e);
  }
}
canvas.addEventListener('pointerdown', handleInput);
document.getElementById('start-btn').onclick = handleInput;
document.getElementById('restart-btn').onclick = handleInput;

// ─── LOOP ─────────────────────────────────────────────────────
function loop(t) {
  ctx.clearRect(0, 0, W, H);
  ctx.save();
  if (shake > 0.5) {
    ctx.translate((Math.random()-0.5)*shake, (Math.random()-0.5)*shake);
    shake *= 0.9;
  }

  if (state === 'play') {
    if (typeof update === 'function') update();
    if (typeof draw === 'function') draw();
    document.getElementById('score-ui').innerText = score;
  }

  ctx.restore();
  requestAnimationFrame(loop);
}

// ─── GAME LOGIC (REPLACE THIS) ────────────────────────────────
function init() {
  // Initialize your game objects here
}

function onTouch(e) {
  // Handle tap/touch events during gameplay
}

function update() {
  // Game physics and logic
}

function draw() {
  ctx.clearRect(0, 0, W, H);
  // Render your game here
}

function gameOver() {
  state = 'over';
  if(score > hi) { hi = score; safeStorage.set('smol_hi', hi); }
  document.getElementById('final-score').innerText = 'Score: ' + score;
  showScreen('over-screen');
}

// START
requestAnimationFrame(loop);
</script>
</body>
</html>
