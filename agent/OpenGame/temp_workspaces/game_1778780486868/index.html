<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Сияющий Кристалл</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: linear-gradient(135deg, #0a0a1a 0%, #1a1a3a 50%, #0a0a1a 100%);
            color: #ffffff;
            font-family: 'Arial', sans-serif;
        }
        canvas {
            display: block;
        }
    </style>
</head>
<body>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/phaser/3.60.0/phaser.min.js"></script>
    <script>
        const config = {
            type: Phaser.AUTO,
            width: window.innerWidth,
            height: window.innerHeight,
            backgroundColor: '#000000',
            parent: 'game-container',
            physics: {
                default: 'arcade',
                arcade: {
                    gravity: { y: 0 },
                    debug: false
                }
            },
            scene: {
                preload: preload,
                create: create,
                update: update
            }
        };

        const game = new Phaser.Game(config);
        let player;
        let cursors;
        let particles;
        let glow;
        let screenShake = false;
        let shakeTimer = 0;

        function preload() {
            this.load.image('particle', 'data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIxMCIgaGVpZ2h0PSIxMCI+PHBhdGggZmlsbD0iI2ZmZmZmZiIgZD0iTTUgNS41TDQuNSA1TDUgNC41VjUuNVY1LjVIMTVWNS41SDUuNVYxNS41SDUgMTUuNVYxNS41VjE1LjVIMTVWNS41SDUuNVoiLz48L3N2Zz4=');
        }

        function create() {
            const centerX = this.cameras.main.centerX;
            const centerY = this.cameras.main.centerY;

            // Dark space background with stars
            this.add.rectangle(0, 0, config.width, config.height, 0x0a0a1a).setOrigin(0);
            for (let i = 0; i < 100; i++) {
                const x = Phaser.Math.Between(0, config.width);
                const y = Phaser.Math.Between(0, config.height);
                const size = Phaser.Math.FloatBetween(0.5, 2);
                const brightness = Phaser.Math.FloatBetween(0.3, 0.8);
                this.add.circle(x, y, size, Phaser.Math.RND.pick([0xffffff, 0xcccccc, 0xaaaaaa]) * brightness);
            }

            // Player - glowing crystal
            player = this.add.circle(centerX, centerY, 30, 0x6a5acd);
            player.setStrokeStyle(4, 0x9370db, 0.8);

            // Glow effect
            glow = this.add.graphics();
            glow.fillStyle(0x9370db, 0.2);
            glow.fillCircle(centerX, centerY, 60);
            glow.setAlpha(0.7);

            // Particle trail
            particles = this.add.particles('particle');
            const emitter = particles.createEmitter({
                speed: 100,
                scale: { start: 0.5, end: 0 },
                blendMode: 'ADD',
                lifespan: 500,
                frequency: 50,
                maxParticles: 50,
                tint: [0x6a5acd, 0x9370db, 0xffffff]
            });

            // Camera shake effect
            this.cameras.main.setBounds(0, 0, config.width, config.height);

            // Controls
            cursors = this.input.keyboard.createCursorKeys();
            this.input.on('pointerdown', () => {
                screenShake = true;
                shakeTimer = 0.3;
            });
        }

        function update(time, delta) {
            const speed = 200;
            const prevX = player.x;
            const prevY = player.y;

            // Movement
            if (cursors.left.isDown || this.input.keyboard.checkDown(this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.A))) {
                player.x -= speed;
            } else if (cursors.right.isDown || this.input.keyboard.checkDown(this.input.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.D))) {
                player.x += speed;
            }

            if (cursors.up.isDown || this.input.keyboard.checkDown(this.input.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.W))) {
                player.y -= speed;
            } else if (cursors.down.isDown || this.input.keyboard.checkDown(this.input.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.S))) {
                player.y += speed;
            }

            // Boundary check
            player.x = Phaser.Math.Clamp(player.x, 30, config.width - 30);
            player.y = Phaser.Math.Clamp(player.y, 30, config.height - 30);

            // Update glow position
            glow.clear();
            glow.fillStyle(0x9370db, 0.2);
            glow.fillCircle(player.x, player.y, 60);

            // Update particle trail
            const emitter = particles.emitters.list[0];
            emitter.setPosition(player.x, player.y);
            emitter.setSpeed(Phaser.Math.FloatBetween(50, 150));

            // Screen shake
            if (screenShake) {
                shakeTimer -= delta / 1000;
                if (shakeTimer <= 0) {
                    screenShake = false;
                } else {
                    const intensity = shakeTimer * 10;
                    this.cameras.main.shake(intensity, 0.01, false, () => {
                        this.cameras.main.setPosition(0, 0);
                    });
                }
            }
        }
    </script>
</body>
</html>
