<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Сияющий Кристалл</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: linear-gradient(135deg, #0a0a1a 0%, #1a1a3a 50%, #0a0a1a 100%);
            font-family: 'Arial', sans-serif;
        }
        #game-container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
    </style>
</head>
<body>
    <div id="game-container"></div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/phaser/3.60.0/phaser.min.js"></script>
    <script>
        const config = {
            type: Phaser.AUTO,
            width: window.innerWidth,
            height: window.innerHeight,
            parent: 'game-container',
            backgroundColor: '#000000',
            physics: {
                default: 'arcade',
                arcade: {
                    gravity: { y: 0 },
                    debug: false
                }
            },
            scene: {
                preload: preload,
                create: create,
                update: update
            }
        };

        const game = new Phaser.Game(config);
        let player;
        let cursors;
        let particles;
        let glow;
        let screenShake = false;
        let shakeDuration = 0;
        let shakeIntensity = 0;

        function preload() {
            this.load.image('particle', 'data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIxMCIgaGVpZ2h0PSIxMCI+PHBhdGggZmlsbD0iI2ZmZmZmZiIgZD0iTTUgNS41TDIuNSA3SDcgMjdIMi41Wk03IDdIMi41SDdMMi41Wk03IDdIMi41SDdMMi41Wk03IDdIMi41SDdMMi41WiIgc3Ryb2tlPSIjZmZmZmZmIiBzdHJva2Utd2lkdGg9IjEuNSIgc3Ryb2tlLWxpbmVjYXA9InJvdW5kIiBzdHJva2UtbGluZWpvaW49InJvdW5kIj48L3BhdGg+PC9zdmc+');
        }

        function create() {
            const centerX = this.cameras.main.centerX;
            const centerY = this.cameras.main.centerY;

            // Dark space background with stars
            this.add.rectangle(0, 0, config.width, config.height, 0x0a0a1a).setOrigin(0);
            for (let i = 0; i < 100; i++) {
                const x = Phaser.Math.Between(0, config.width);
                const y = Phaser.Math.Between(0, config.height);
                const size = Phaser.Math.FloatBetween(0.5, 2);
                const alpha = Phaser.Math.FloatBetween(0.3, 0.8);
                this.add.circle(x, y, size, 0xffffff, alpha);
            }

            // Player crystal
            player = this.add.circle(centerX, centerY, 25, 0x6a5acd);
            player.setStrokeStyle(4, 0x9370db, 1);

            // Glow effect
            glow = this.add.circle(centerX, centerY, 40, 0x9370db, 0.2);
            glow.setBlendMode(Phaser.BlendModes.ADD);

            // Particle trail
            particles = this.add.particles('particle');
            const emitter = particles.createEmitter({
                speed: 100,
                scale: { start: 0.5, end: 0 },
                blendMode: 'ADD',
                lifespan: 500,
                frequency: 50,
                maxParticles: 50,
                emitCallback: (particle) => {
                    particle.setPosition(player.x, player.y);
                    particle.setVelocity(
                        Phaser.Math.Between(-50, 50),
                        Phaser.Math.Between(-50, 50)
                    );
                    particle.setAlpha(0.8);
                }
            });

            // Controls
            cursors = this.input.keyboard.createCursorKeys();
            this.input.keyboard.addKey('W');
            this.input.keyboard.addKey('A');
            this.input.keyboard.addKey('S');
            this.input.keyboard.addKey('D');

            // Screen shake on click
            this.input.on('pointerdown', () => {
                screenShake = true;
                shakeDuration = 30;
                shakeIntensity = 5;
            });

            // UI Text
            this.add.text(20, 20, 'Управление: WASD', {
                fontSize: '24px',
                fill: '#ffffff',
                fontStyle: 'bold',
                stroke: '#000000',
                strokeThickness: 3
            }).setOrigin(0);

            this.add.text(20, 50, 'Кликните, чтобы тряхнуть экран', {
                fontSize: '24px',
                fill: '#ffffff',
                fontStyle: 'bold',
                stroke: '#000000',
                strokeThickness: 3
            }).setOrigin(0);
        }

        function update() {
            if (screenShake) {
                shakeDuration--;
                if (shakeDuration <= 0) {
                    screenShake = false;
                } else {
                    const offsetX = Phaser.Math.FloatBetween(-shakeIntensity, shakeIntensity);
                    const offsetY = Phaser.Math.FloatBetween(-shakeIntensity, shakeIntensity);
                    this.cameras.main.setScroll(offsetX, offsetY);
                }
            }

            // Movement
            const speed = 300;
            const velocityX = (cursors.D.isDown ? speed : 0) - (cursors.A.isDown ? speed : 0);
            const velocityY = (cursors.S.isDown ? speed : 0) - (cursors.W.isDown ? speed : 0);

            player.setVelocity(velocityX, velocityY);
            glow.setPosition(player.x, player.y);
            particles.setPosition(player.x, player.y);

            // Boundary check
            player.x = Phaser.Math.Clamp(player.x, 25, config.width - 25);
            player.y = Phaser.Math.Clamp(player.y, 25, config.height - 25);
        }
    </script>
</body>
</html>
